<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UICanvas</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 画布视口 -->
  <div id="canvas-viewport">
    <div id="canvas-world"></div>
  </div>

  <!-- 状态栏 -->
  <div id="status-bar">
    <span class="status-dot" id="ws-status"></span>
    <span id="status-text">Connecting…</span>
  </div>

  <!-- 底部工具栏 -->
  <div id="toolbar">
    <button class="toolbar-btn" id="btn-undo" title="Undo (⌘Z)" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 7h7a3 3 0 010 6H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 4L3 7l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="toolbar-btn" id="btn-redo" title="Redo (⌘⇧Z)" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13 7H6a3 3 0 000 6h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-zoom-out" title="Zoom Out">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <span id="zoom-level">100%</span>
    <button class="toolbar-btn" id="btn-zoom-in" title="Zoom In">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-fit" title="Fit to Screen (⌘1)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M5 8h6" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        <path d="M8 5v6" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="toolbar-btn" id="btn-reset" title="Reset View (⌘0)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="8" cy="8" r="1" fill="currentColor"/>
      </svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-export" title="Export PNG (⌘E)" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script type="module">
    import { Canvas } from '/js/canvas.js';
    import { ArtboardRenderer } from '/js/artboard.js';
    import { WSClient } from '/js/ws-client.js';
    import { registerComponents } from '/js/components.js';
    import { HistoryManager } from '/js/history.js';
    import { renderComponentGallery } from '/components/index.js';
    import { generateSpecTemplate } from '/components/design-spec-template.js';

    // 初始化
    const viewport = document.getElementById('canvas-viewport');
    const world = document.getElementById('canvas-world');

    const canvas = new Canvas(viewport, world);
    const renderer = new ArtboardRenderer(world);
    const history = new HistoryManager(50);
    const wsClient = new WSClient(renderer, history);

    // 组件注册
    registerComponents();

    // ── UI 状态管理 ──
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnExport = document.getElementById('btn-export');

    function updateButtonStates() {
      btnUndo.disabled = !history.canUndo;
      btnRedo.disabled = !history.canRedo;
      btnExport.disabled = !renderer.selectedId;
    }

    history.onChange(updateButtonStates);
    renderer.onSelectionChange = () => updateButtonStates();

    // ── Undo/Redo ──
    function getContentEl(artboardId) {
      const el = renderer.artboardEls.get(artboardId);
      return el ? el.querySelector('.artboard-content') : null;
    }

    btnUndo.addEventListener('click', () => {
      history.undo(getContentEl);
    });

    btnRedo.addEventListener('click', () => {
      history.redo(getContentEl);
    });

    // ── 导出 PNG (dom-to-image-more) ──
    let _domToImageReady = null;
    function loadDomToImage() {
      if (_domToImageReady) return _domToImageReady;
      _domToImageReady = new Promise((resolve, reject) => {
        if (window.domtoimage) return resolve(window.domtoimage);
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.5/dist/dom-to-image-more.min.js';
        s.onload = () => resolve(window.domtoimage);
        s.onerror = reject;
        document.head.appendChild(s);
      });
      return _domToImageReady;
    }

    async function exportSelectedArtboard() {
      if (!renderer.selectedId) return;
      const el = renderer.artboardEls.get(renderer.selectedId);
      if (!el) return;

      btnExport.disabled = true;
      btnExport.style.opacity = '0.5';

      try {
        const domtoimage = await loadDomToImage();
        const artboardBody = el.querySelector('.artboard') || el;
        const w = artboardBody.offsetWidth;
        const h = artboardBody.offsetHeight;

        const scale = 2;
        const dataUrl = await domtoimage.toPng(artboardBody, {
          width: w * scale,
          height: h * scale,
          style: {
            transform: `scale(${scale})`,
            transformOrigin: 'top left',
            width: `${w}px`,
            height: `${h}px`,
          },
        });

        const fileName = renderer.getArtboardFileName(renderer.selectedId) + '.png';
        const link = document.createElement('a');
        link.download = fileName;
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (err) {
        console.error('[export] Failed:', err);
      } finally {
        btnExport.disabled = false;
        btnExport.style.opacity = '';
        updateButtonStates();
      }
    }

    btnExport.addEventListener('click', exportSelectedArtboard);

    // ── 快捷键 ──
    document.addEventListener('keydown', (e) => {
      const isMeta = e.metaKey || e.ctrlKey;
      if (isMeta && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        history.undo(getContentEl);
      } else if (isMeta && e.key === 'z' && e.shiftKey) {
        e.preventDefault();
        history.redo(getContentEl);
      } else if (isMeta && e.key === 'e') {
        e.preventDefault();
        exportSelectedArtboard();
      }
    });

    // WebSocket 连接
    wsClient.onStatusChange = (connected) => {
      const dot = document.getElementById('ws-status');
      const text = document.getElementById('status-text');
      dot.classList.toggle('connected', connected);
      text.textContent = connected ? 'Connected' : 'Reconnecting…';
    };
    wsClient.connect();

    // 工具栏按钮
    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      const rect = viewport.getBoundingClientRect();
      canvas.zoomAt(rect.width / 2, rect.height / 2, 0.15);
    });

    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      const rect = viewport.getBoundingClientRect();
      canvas.zoomAt(rect.width / 2, rect.height / 2, -0.15);
    });

    document.getElementById('btn-fit').addEventListener('click', () => canvas.fitToScreen());
    document.getElementById('btn-reset').addEventListener('click', () => canvas.resetView());

    // 点击空白区域取消选中
    viewport.addEventListener('click', (e) => {
      if (e.target === viewport || e.target === world) {
        renderer.deselectAll();
      }
    });

    // 暴露到全局 (调试/测试用)
    window.dc = { canvas, renderer, wsClient, history };

    // ── Demo: Hello World App ──
    setTimeout(() => {
      // 创建 iPhone 画板
      renderer.create({
        id: 'hw-app', name: 'Hello World App',
        project: 'UICanvas', page: 'Hello World', state: 'Default',
        width: 390, height: 844, left: 0, top: 0,
        styles: { backgroundColor: '#000', borderRadius: '40px' }
      });

      // 状态栏
      renderer.writeHTML({
        targetNodeId: 'hw-app-content', mode: 'insert-children',
        html: `<div layer-name="Status Bar" style="display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; color:#fff; font:600 14px/18px system-ui;">
          <span>9:41</span>
          <div style="display:flex; gap:6px; align-items:center;">
            <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1 8h2v4H1zM5 5h2v7H5zM9 2h2v10H9zM13 0h2v12h-2z" fill="#fff"/></svg>
            <svg width="15" height="11" viewBox="0 0 15 11"><path d="M7.5 3.5a6 6 0 014.2 1.7l1.1-1.1A7.5 7.5 0 007.5 1.5 7.5 7.5 0 002.2 3.6L3.3 5.2A6 6 0 017.5 3.5z" fill="#fff"/><path d="M7.5 6.5a3.5 3.5 0 012.5 1l1.1-1.1a5 5 0 00-7.2 0L5 7.5a3.5 3.5 0 012.5-1z" fill="#fff"/><circle cx="7.5" cy="9.5" r="1.5" fill="#fff"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="16" height="7" rx="1" fill="#30D158"/><rect x="22" y="4" width="2" height="4" rx="1" fill="#fff"/></svg>
          </div>
        </div>`
      });

      // 主内容
      renderer.writeHTML({
        targetNodeId: 'hw-app-content', mode: 'insert-children',
        html: `<div layer-name="Main Content" style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:0 32px; gap:24px;">
          <div style="width:120px; height:120px; border-radius:28px; background:linear-gradient(135deg, #5E5CE6, #BF5AF2); display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 32px rgba(94,92,230,0.4);">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><path d="M28 8l5.5 11 12.5 2-9 9 2 12.5L28 37l-11 5.5 2-12.5-9-9 12.5-2z" fill="#fff" opacity="0.9"/></svg>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
            <span style="font:700 34px/41px system-ui; color:#fff; letter-spacing:-0.5px;">Hello, World!</span>
            <span style="font:400 17px/22px system-ui; color:#8E8E93;">Welcome to DesignCanvas</span>
          </div>
          <div style="display:flex; gap:12px; margin-top:16px;">
            <div style="padding:14px 32px; background:#5E5CE6; border-radius:14px; font:600 17px/22px system-ui; color:#fff;">Get Started</div>
            <div style="padding:14px 32px; background:#2C2C2E; border-radius:14px; font:600 17px/22px system-ui; color:#fff;">Learn More</div>
          </div>
        </div>`
      });

      // Home Indicator
      renderer.writeHTML({
        targetNodeId: 'hw-app-content', mode: 'insert-children',
        html: `<div layer-name="Home Indicator" style="display:flex; justify-content:center; padding:8px 0 12px;">
          <div style="width:134px; height:5px; background:rgba(255,255,255,0.3); border-radius:3px;"></div>
        </div>`
      });

      // ═══════════════════════════════════════════
      // Design Spec 画板 (复用 generateSpecTemplate)
      // ═══════════════════════════════════════════
      renderer.create({
        id: 'ds-spec', name: 'Design System — Spec Sheet',
        width: 680, height: 1400, left: 470, top: 0,
        styles: { backgroundColor: '#000', borderRadius: '12px' }
      });

      renderer.writeHTML({
        targetNodeId: 'ds-spec-content', mode: 'insert-children',
        html: generateSpecTemplate('UICanvas'),
      });

      // 组件库 Gallery
      renderComponentGallery(renderer);

      // 适应画面
      canvas.fitToScreen();
      console.log('🚀 Demo + Gallery created');
    }, 200);

    console.log('🎨 DesignCanvas ready');
  </script>
</body>
</html>
